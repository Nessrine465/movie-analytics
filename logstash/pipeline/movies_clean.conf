input {
  file {
    path => "/data/movies.csv"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    mode => "read"
  }
}

filter {
  csv {
    separator => ","
    skip_header => true
    columns => [
      "id",
      "title",
      "genres",
      "original_language",
      "overview",
      "popularity",
      "production_companies",
      "release_date",
      "budget",
      "revenue",
      "runtime",
      "status",
      "tagline",
      "vote_average",
      "vote_count",
      "credits",
      "keywords",
      "poster_path",
      "backdrop_path",
      "recommendations"
    ]
    }
 }
output {
      elasticsearch {
        hosts => ["http://elasticsearch:9200"]
        index => "movies_clean"
      }
     stdout { codec => rubydebug }
}
