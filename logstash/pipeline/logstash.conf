########################################################
# LOGSTASH PIPELINE — Movies Data Platform
# Flux : movies.csv -> movies_raw + movies_clean
########################################################

input {
  file {
    path          => "/data/movies.csv"
    start_position => "beginning"
    sincedb_path  => "/dev/null"
    codec         => plain { charset => "UTF-8" }
    tags          => ["movies"]
  }
}

# ──────────────────────────────────────────────────────
# FILTER — PARSING CSV
# ──────────────────────────────────────────────────────
filter {

  # 1. Parser la ligne CSV
  csv {
    separator  => ","
    quote_char => '"'
    columns    => [
      "id", "title", "genres", "original_language", "overview",
      "popularity", "production_companies", "release_date",
      "budget", "revenue", "runtime", "status", "tagline",
      "vote_average", "vote_count", "credits", "keywords",
      "poster_path", "backdrop_path", "recommendations"
    ]
  }

  # 2. Supprimer la ligne d'en-tête
  if [id] == "id" { drop {} }

  # 3. Supprimer les champs techniques Logstash inutiles
  mutate {
    remove_field => ["message", "host", "@version", "event", "log"]
  }

  # ──────────────────────────────────────────────────
  # CONVERSION DES TYPES NUMÉRIQUES
  # ──────────────────────────────────────────────────

  mutate {
    convert => {
      "popularity"    => "float"
      "budget"        => "float"
      "revenue"       => "float"
      "runtime"       => "float"
      "vote_average"  => "float"
      "vote_count"    => "float"
      "id"            => "integer"
    }
  }

  # Convertir en integer après float (évite les erreurs de parsing "137.0")
  mutate {
    convert => {
      "runtime"    => "integer"
      "vote_count" => "integer"
      "id"         => "integer"
    }
  }

  # ──────────────────────────────────────────────────
  # PARSING DE LA DATE
  # ──────────────────────────────────────────────────

  if [release_date] and [release_date] != "" {
    date {
      match  => ["release_date", "yyyy-MM-dd"]
      target => "release_date"
    }
  } else {
    mutate { remove_field => ["release_date"] }
  }

  # ──────────────────────────────────────────────────
  # NORMALISATION DES CHAMPS LISTE (séparateur "-")
  # ──────────────────────────────────────────────────

  # Genres
  if [genres] and [genres] != "" {
    mutate { split => { "genres" => "-" } }
    ruby {
      code => 'event.set("genres", event.get("genres").map(&:strip).reject(&:empty?))'
    }
  } else {
    mutate { replace => { "genres" => [] } }
  }

  # Keywords
  if [keywords] and [keywords] != "" {
    mutate { split => { "keywords" => "-" } }
    ruby {
      code => 'event.set("keywords", event.get("keywords").map(&:strip).reject(&:empty?))'
    }
  } else {
    mutate { replace => { "keywords" => [] } }
  }

  # Credits (acteurs)
  if [credits] and [credits] != "" {
    mutate { split => { "credits" => "-" } }
    ruby {
      code => 'event.set("credits", event.get("credits").map(&:strip).reject(&:empty?))'
    }
  } else {
    mutate { replace => { "credits" => [] } }
  }

  # Production companies
  if [production_companies] and [production_companies] != "" {
    mutate { split => { "production_companies" => "-" } }
    ruby {
      code => 'event.set("production_companies", event.get("production_companies").map(&:strip).reject(&:empty?))'
    }
  } else {
    mutate { replace => { "production_companies" => [] } }
  }

  # Recommendations (IDs séparés par "-")
  if [recommendations] and [recommendations] != "" {
    mutate { split => { "recommendations" => "-" } }
    ruby {
      code => 'event.set("recommendations", event.get("recommendations").map(&:strip).reject(&:empty?))'
    }
  } else {
    mutate { replace => { "recommendations" => [] } }
  }

  # ──────────────────────────────────────────────────
  # NETTOYAGE DES VALEURS INVALIDES
  # ──────────────────────────────────────────────────

  # Budget à 0 = inconnu -> supprimer
  if [budget] and [budget] <= 0 {
    mutate { remove_field => ["budget"] }
  }

  # Revenue à 0 = inconnu -> supprimer
  if [revenue] and [revenue] <= 0 {
    mutate { remove_field => ["revenue"] }
  }

  # Runtime à 0 ou négatif -> supprimer
  if [runtime] and [runtime] <= 0 {
    mutate { remove_field => ["runtime"] }
  }

  # Popularité négative (erreur) -> supprimer
  if [popularity] and [popularity] < 0 {
    mutate { remove_field => ["popularity"] }
  }

  # vote_average hors bornes [0, 10]
  if [vote_average] {
    ruby {
      code => '
        va = event.get("vote_average")
        if va < 0 || va > 10
          event.remove("vote_average")
        end
      '
    }
  }

  # Tagline vide -> supprimer le champ
  if [tagline] == "" {
    mutate { remove_field => ["tagline"] }
  }

  # Overview vide -> supprimer
  if [overview] == "" {
    mutate { remove_field => ["overview"] }
  }

  # ──────────────────────────────────────────────────
  # AJOUT D'UN TAG DE QUALITÉ
  # ──────────────────────────────────────────────────

  ruby {
    code => '
      issues = []
      issues << "missing_overview"           unless event.get("overview")
      issues << "missing_budget"             unless event.get("budget")
      issues << "missing_revenue"            unless event.get("revenue")
      issues << "missing_release_date"       unless event.get("release_date")
      issues << "no_genres"                  if (event.get("genres") || []).empty?
      event.set("data_quality_issues", issues)
      event.set("data_quality_score", 100 - (issues.length * 10))
    '
  }

}

# ──────────────────────────────────────────────────────
# OUTPUT — Deux index : raw et clean
# ──────────────────────────────────────────────────────
output {

  # Index brut (toutes les données telles quelles)
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "movies_raw"
    document_id => "%{id}"
  }

  # Index nettoyé (même pipeline, données converties)
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "movies_clean"
    document_id => "%{id}"
  }

}
